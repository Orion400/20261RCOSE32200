name: Lab checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Syntax check
        run: python -m compileall .
      - name: Run tests
        run: python -m pytest
      - name: Verify generated artifacts are not tracked
        run: |
          forbidden='^(key\.pem|cert\.pem|recovered_key\.pem|weak_rsa_params\.txt|.*\.pcapng?|\.venv/|__pycache__/|.*__pycache__/.*)$'
          if git ls-files | grep -E "$forbidden"; then
            echo "generated artifact is tracked" >&2
            exit 1
          fi
